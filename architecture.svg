<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SnapLink architecture</title>
<desc>Browser sends a request to a FastAPI app on Render, which responds back to the browser. To answer a redirect, the app checks a Redis cache on Upstash first, falling back to a Postgres database on Neon on a cache miss, then saves the result back to Redis.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="400" fill="#ffffff"/>

<!-- Browser -->
<rect x="250" y="40" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="66" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Browser</text>

<!-- Request/response connector between Browser and FastAPI -->
<line x1="325" y1="84" x2="325" y2="144" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="355" y1="144" x2="355" y2="84" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">request down,</text>
<text x="440" y="121" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">response back up</text>

<!-- FastAPI app -->
<rect x="240" y="144" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="166" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">FastAPI app</text>
<text x="340" y="184" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">Hosted on Render</text>

<!-- Stem -->
<line x1="340" y1="200" x2="340" y2="230" stroke="#5F5E5A" stroke-width="1.5"/>

<!-- Branch labels -->
<text x="265" y="222" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">1. check cache</text>
<text x="415" y="222" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">2. on a miss</text>

<!-- Branch to Redis -->
<path d="M340 230 L190 230 L190 260" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Branch to Postgres -->
<path d="M340 230 L490 230 L490 260" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Redis cache -->
<rect x="90" y="260" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="282" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Redis cache</text>
<text x="190" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">Upstash, checked first</text>

<!-- Postgres database -->
<rect x="390" y="260" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="490" y="282" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Postgres database</text>
<text x="490" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">Neon, source of truth</text>

<!-- Return arrow -->
<path d="M490 316 L490 340 L190 340 L190 316" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text x="340" y="360" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">3. save result to cache, for next time</text>

<!-- Note -->
<text x="340" y="384" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">Either way, the answer travels back up through the app to the browser</text>

</svg>
